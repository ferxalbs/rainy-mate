name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  typecheck-and-build:
    permissions:
      contents: read
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript Type Check
        run: pnpm run typecheck || pnpm exec tsc --noEmit

      - name: Build
        run: pnpm run build

  rust-tests:
    permissions:
      contents: read
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Build Rust
        run: cd src-tauri && cargo build --lib

      - name: Run Rust Tests
        run: cd src-tauri && cargo test --lib

      - name: Cross-target Check (Apple Silicon)
        run: cd src-tauri && cargo check --target aarch64-apple-darwin

      - name: Cross-target Check (Intel)
        run: cd src-tauri && cargo check --target x86_64-apple-darwin

  macos-intel-smoke:
    permissions:
      contents: read
    runs-on: macos-15-intel
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust Tests (Intel)
        run: cd src-tauri && cargo test --lib

  tauri-build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsqlite3-dev pkg-config
          echo "LIBSQLITE3_SYS_USE_PKG_CONFIG=1" >> $GITHUB_ENV

      - name: Install dependencies (windows only)
        if: matrix.platform == 'windows-latest'
        run: |
          vcpkg install sqlite3:x64-windows
          echo "VCPKGRS_DYNAMIC=1" >> $env:GITHUB_ENV
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
          echo "C:\vcpkg\installed\x64-windows\bin" >> $env:GITHUB_PATH
          echo "LIBSQLITE3_SYS_USE_PKG_CONFIG=1" >> $env:GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Tauri Build
        run: |
          echo '{"bundle":{"createUpdaterArtifacts":false}}' > ci-config.json
          pnpm run tauri build --config ci-config.json ${{ matrix.args }}

      - name: Verify Universal Binary
        if: matrix.platform == 'macos-latest'
        run: |
          APP_BUNDLE=$(find src-tauri/target/universal-apple-darwin/release/bundle/macos -name "Rainy MaTE.app" -type d | head -n 1)
          test -n "$APP_BUNDLE"
          APP_BIN="$APP_BUNDLE/Contents/MacOS/rainy-mate"
          test -f "$APP_BIN"
          lipo -archs "$APP_BIN" | grep -E "arm64.*x86_64|x86_64.*arm64"
          file "$APP_BIN"
          test -f "$APP_BUNDLE/Contents/Frameworks/libRainyNativeNotifications.dylib"
          test -f "$APP_BUNDLE/Contents/Frameworks/libRainyQuickDelegate.dylib"
          ! otool -L "$APP_BIN" | grep -q 'libRainyNativeNotifications.dylib'
          ! otool -L "$APP_BIN" | grep -q 'libRainyQuickDelegate.dylib'
          lipo -archs "$APP_BUNDLE/Contents/Frameworks/libRainyNativeNotifications.dylib" | grep -E "arm64.*x86_64|x86_64.*arm64"
          lipo -archs "$APP_BUNDLE/Contents/Frameworks/libRainyQuickDelegate.dylib" | grep -E "arm64.*x86_64|x86_64.*arm64"
